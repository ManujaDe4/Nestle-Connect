<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Store Verification</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>

  <div class="page-wrapper">

    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 12l2 2 4-4" />
          <rect x="3" y="3" width="18" height="18" rx="3" />
        </svg>
      </div>
      <span class="brand-name">Nestlé Connect</span>
      <span class="brand-divider">·</span>
      <span class="brand-sub">Store Portal</span>
    </div>

    <div class="card">
      <div class="corner-mark">V</div>

      <div class="card-header">
        <h1 class="card-title">Store <span>Verification</span></h1>
        <p id="shopName">Loading shop details…</p>
      </div>

      <hr class="divider" />

      <div class="form-group">
        <label for="voucherCode">Voucher Code</label>
        <input
          type="text"
          id="voucherCode"
          placeholder="Enter voucher code"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <button id="submitBtn"><span>Send OTP</span></button>

      <div id="otpSection" style="display: none; margin-top: 20px;">
        <div class="form-group">
          <label for="otpCode">OTP Verification</label>
          <input
            type="text"
            id="otpCode"
            placeholder="Enter OTP provided by customer"
            autocomplete="off"
            spellcheck="false"
          />
        </div>

        <button id="verifyBtn" class="btn-primary"><span>Verify OTP</span></button>
      </div>

      <hr class="divider" />

      <div id="responseMsg">Awaiting voucher submission…</div>

      <p class="card-footer">
        The same OTP is sent to both the customer and the relevant shop owner. Ask the customer for the OTP and verify it here.
      </p>
    </div>

  </div>

  <script>
    const API_BASE = "https://nestle-connect.onrender.com";

    let shopSlug = "";
    let redemptionId = "";
    let currentOtp = "";

    const shopEl = document.getElementById("shopName");
    const voucherInput = document.getElementById("voucherCode");
    const submitBtn = document.getElementById("submitBtn");
    const responseMsg = document.getElementById("responseMsg");
    const otpSection = document.getElementById("otpSection");
    const otpInput = document.getElementById("otpCode");
    const verifyBtn = document.getElementById("verifyBtn");

    function getShopSlug() {
      const params = new URLSearchParams(window.location.search);
      return params.get("shop");
    }

    function setMessage(message, type = "") {
      responseMsg.className = "";
      responseMsg.innerHTML = message;

      if (type === "success") {
        responseMsg.classList.add("state-success");
      } else if (type === "error") {
        responseMsg.classList.add("state-error");
      }
    }

    function setButtonState(button, disabled, text) {
      button.disabled = disabled;
      const span = button.querySelector("span");
      if (span && text) span.innerText = text;
    }

    async function loadShop() {
      shopSlug = getShopSlug();

      if (!shopSlug) {
        shopEl.innerText = "No shop slug found in URL.";
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/shops/${shopSlug}`);
        const data = await res.json();

        if (!res.ok) {
          shopEl.innerText = data.message || "Shop not found.";
          return;
        }

        shopEl.innerText = data.shop_name;
        shopEl.classList.add("loaded");
      } catch (err) {
        console.error(err);
        shopEl.innerText = "Error loading shop details.";
      }
    }

    async function startRedemption() {
      const voucherCode = voucherInput.value.trim();

      if (!voucherCode) {
        setMessage("Please enter a voucher code before submitting.", "error");
        return;
      }

      if (voucherCode.length < 4) {
        setMessage("Invalid voucher format. Please check the code and try again.", "error");
        return;
      }

      setButtonState(submitBtn, true, "Processing...");
      setMessage("Generating OTP and sending to customer and shop owner...");

      try {
        const res = await fetch(`${API_BASE}/api/redemptions/start`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            voucher_code: voucherCode,
            shop_slug: shopSlug
          })
        });

        const data = await res.json();

        if (!res.ok) {
          setMessage(data.message || "Failed to start redemption.", "error");
          setButtonState(submitBtn, false, "Send OTP");
          return;
        }

        redemptionId = data.redemption?.redemption_id || data.redemption_id || "";
        currentOtp = data.redemption?.otp_code || data.otp_code || "";

        otpSection.style.display = "block";

        setMessage(
          `OTP sent successfully to both the customer and the shop owner.<br><br><b>Demo OTP:</b> ${currentOtp}<br><br>Ask the customer for the OTP and enter it below to complete verification.`,
          "success"
        );
      } catch (err) {
        console.error(err);
        setMessage("Server error while starting redemption.", "error");
      } finally {
        setButtonState(submitBtn, false, "Send OTP");
      }
    }

    async function verifyOTP() {
      const otp = otpInput.value.trim();

      if (!otp) {
        setMessage("Please enter the OTP before verification.", "error");
        return;
      }

      if (!redemptionId) {
        setMessage("No active redemption found. Please start redemption first.", "error");
        return;
      }

      setButtonState(verifyBtn, true, "Verifying...");
      setMessage("Verifying OTP...");

      try {
        const res = await fetch(`${API_BASE}/api/redemptions/verify`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            redemption_id: redemptionId,
            otp_code: otp
          })
        });

        const data = await res.json();

        if (!res.ok) {
          setMessage(data.message || "OTP verification failed.", "error");
          setButtonState(verifyBtn, false, "Verify OTP");
          return;
        }

        setMessage("✓ Redemption successful. Transaction recorded.", "success");
        otpInput.disabled = true;
        verifyBtn.disabled = true;
        submitBtn.disabled = true;
      } catch (err) {
        console.error(err);
        setMessage("Server error while verifying OTP.", "error");
      } finally {
        if (!verifyBtn.disabled) {
          setButtonState(verifyBtn, false, "Verify OTP");
        }
      }
    }

    submitBtn.addEventListener("click", startRedemption);
    verifyBtn.addEventListener("click", verifyOTP);

    loadShop();
  </script>

</body>
</html>
