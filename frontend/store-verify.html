<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Store Verification</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>

  <div class="page-wrapper">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 12l2 2 4-4" />
          <rect x="3" y="3" width="18" height="18" rx="3" />
        </svg>
      </div>
      <span class="brand-name">Nestlé Connect</span>
      <span class="brand-divider">·</span>
      <span class="brand-sub">Store Portal</span>
    </div>

    <!-- Card -->
    <div class="card">
      <div class="corner-mark">V</div>

      <div class="card-header">
        <h1 class="card-title">Store <span>Verification</span></h1>
        <p id="shopName">Loading shop details…</p>
      </div>

      <hr class="divider" />

      <div class="form-group">
        <label for="voucherCode">Voucher Code</label>
        <input
          type="text"
          id="voucherCode"
          placeholder="e.g. NSTL-XXXX-0000"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <button id="submitBtn"><span>Redeem Voucher</span></button>

      <hr class="divider" />

      <div id="responseMsg">Awaiting voucher submission…</div>

      <p class="card-footer">
        Transactions are secured and logged. For support, contact your regional rep.
      </p>
    </div>

  </div>

  <script>
    const API_BASE = "https://nestle-connect.onrender.com";
    let shopSlug = "";
    let redemptionId = "";

    function getShopSlug() {
      const params = new URLSearchParams(window.location.search);
      return params.get("shop");
    }

    async function loadShop() {
      shopSlug = getShopSlug();
      const shopEl = document.getElementById("shopName");

      if (!shopSlug) {
        shopEl.innerText = "No shop slug found in URL.";
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/shops/${shopSlug}`);
        const data = await res.json();

        if (!res.ok) {
          shopEl.innerText = data.message || "Shop not found.";
          return;
        }

        shopEl.innerText = data.shop_name;
        shopEl.classList.add("loaded");
      } catch (err) {
        console.error(err);
        shopEl.innerText = "Error loading shop details.";
      }
    }

    async function startRedemption() {
      const voucherCode = document.getElementById("voucherCode").value.trim();
      const msgEl = document.getElementById("responseMsg");

      msgEl.className = "";

      if (!voucherCode) {
        msgEl.innerText = "Please enter a voucher code before submitting.";
        msgEl.classList.add("state-error");
        return;
      }

      msgEl.innerText = "Processing…";

      try {
        const res = await fetch(`${API_BASE}/api/redemptions/start`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ voucher_code: voucherCode, shop_slug: shopSlug })
        });

        const data = await res.json();

        if (!res.ok) {
          msgEl.innerText = data.message || "Failed to start redemption.";
          msgEl.classList.add("state-error");
          return;
        }

        redemptionId = data.redemption?.redemption_id || data.redemption_id || "";
        const otp = data.redemption?.otp_code || data.otp_code || "(hidden)";

        msgEl.innerHTML = `OTP generated: <b>${otp}</b><br><button onclick="verifyOTP()">Verify OTP</button>`;
      } catch (err) {
        console.error(err);
        msgEl.innerText = "Server error while starting redemption.";
        msgEl.classList.add("state-error");
      }
    }

    async function verifyOTP() {
      const otp = prompt("Enter the OTP sent to the customer:");
      const msgEl = document.getElementById("responseMsg");
      if (!otp) return;

      msgEl.innerText = "Verifying…";
      msgEl.className = "";

      try {
        const res = await fetch(`${API_BASE}/api/redemptions/verify`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ redemption_id: redemptionId, otp_code: otp })
        });

        const data = await res.json();

        if (!res.ok) {
          msgEl.innerText = data.message || "OTP verification failed.";
          msgEl.classList.add("state-error");
          return;
        }

        msgEl.innerText = "✓ Redemption successful. Transaction recorded.";
        msgEl.classList.add("state-success");
      } catch (err) {
        console.error(err);
        msgEl.innerText = "Server error while verifying OTP.";
        msgEl.classList.add("state-error");
      }
    }

    document.getElementById("submitBtn").addEventListener("click", startRedemption);
    loadShop();
  </script>

</body>
</html>
