<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Store Verification</title>
</head>
<body>
  <h1>Store Verification</h1>

  <p id="shopName">Loading shop details...</p>

  <div>
    <label for="voucherCode">Voucher Code:</label><br />
    <input type="text" id="voucherCode" placeholder="Enter voucher code" />
    <br /><br />
    <button id="submitBtn">Submit</button>
  </div>

  <p id="responseMsg">Waiting for action...</p>

  <script>
    const API_BASE = "https://nestle-connect.onrender.com";
    let shopSlug = "";
    let redemptionId = "";

    function getShopSlug() {
      const params = new URLSearchParams(window.location.search);
      return params.get("shop");
    }

    async function loadShop() {
      shopSlug = getShopSlug();

      if (!shopSlug) {
        document.getElementById("shopName").innerText = "Invalid shop link: no shop slug found.";
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/shops/${shopSlug}`);
        const data = await res.json();

        if (!res.ok) {
          document.getElementById("shopName").innerText = data.message || "Shop not found.";
          return;
        }

        document.getElementById("shopName").innerText = `Shop: ${data.shop_name}`;
      } catch (err) {
        console.error(err);
        document.getElementById("shopName").innerText = "Error loading shop details.";
      }
    }

    async function startRedemption() {
      const voucherCode = document.getElementById("voucherCode").value.trim();

      if (!voucherCode) {
        document.getElementById("responseMsg").innerText = "Please enter a voucher code.";
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/redemptions/start`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            voucher_code: voucherCode,
            shop_slug: shopSlug
          })
        });

        const data = await res.json();

        if (!res.ok) {
          document.getElementById("responseMsg").innerText = data.message || "Failed to start redemption.";
          return;
        }

        redemptionId = data.redemption?.redemption_id || data.redemption_id || "";
        const otp = data.redemption?.otp_code || data.otp_code || "(hidden)";

        document.getElementById("responseMsg").innerHTML =
          `OTP generated: <b>${otp}</b><br><button onclick="verifyOTP()">Verify OTP</button>`;
      } catch (err) {
        console.error(err);
        document.getElementById("responseMsg").innerText = "Server error while starting redemption.";
      }
    }

    async function verifyOTP() {
      const otp = prompt("Enter OTP:");
      if (!otp) return;

      try {
        const res = await fetch(`${API_BASE}/api/redemptions/verify`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            redemption_id: redemptionId,
            otp_code: otp
          })
        });

        const data = await res.json();

        if (!res.ok) {
          document.getElementById("responseMsg").innerText = data.message || "OTP verification failed.";
          return;
        }

        document.getElementById("responseMsg").innerText = "Redemption successful.";
      } catch (err) {
        console.error(err);
        document.getElementById("responseMsg").innerText = "Server error while verifying OTP.";
      }
    }

    document.getElementById("submitBtn").addEventListener("click", startRedemption);

    loadShop();
  </script>
</body>
</html>
