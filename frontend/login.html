<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Nestlé Connect</title>
  <script src="./js/config.js"></script>
  <link rel="stylesheet" href="./css/styles.css" />
  <style>
    /* ── Override body for centered login layout ── */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 18px;
    }

    .login-wrapper {
      width: 100%;
      max-width: 440px;
      animation: fadeUp 0.5s ease both;
    }

    /* ── Brand header ── */
    .login-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
      justify-content: center;
    }
    .login-brand-logo {
      width: 48px; height: 48px;
      border-radius: 14px;
      background: #fff;
      padding: 8px;
      box-shadow: 0 8px 24px rgba(15, 76, 129, 0.12);
      display: flex; align-items: center; justify-content: center;
    }
    .login-brand-logo img { width: 32px; height: 32px; object-fit: contain; }
    .login-brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--ink-dark);
    }
    .login-brand-divider { color: var(--ink-faint); }
    .login-brand-sub {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    /* ── Card ── */
    .login-card {
      background: rgba(255,255,255,0.98);
      border: 1px solid rgba(15,76,129,0.10);
      border-radius: var(--radius);
      padding: 40px 40px 36px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    /* top accent bar */
    .login-card::before {
      content: '';
      position: absolute;
      left: 36px; right: 36px; top: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 999px;
    }

    .login-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.85rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--ink-dark);
      margin-bottom: 6px;
    }
    .login-sub {
      font-size: 0.85rem;
      color: var(--ink-muted);
      margin-bottom: 28px;
    }

    /* ── Input with icon ── */
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 15px; top: 50%;
      transform: translateY(-50%);
      color: var(--ink-faint);
      display: flex; align-items: center;
      pointer-events: none;
      transition: color var(--transition);
    }
    .input-wrap:focus-within .input-icon { color: var(--primary); }

    .input-wrap input {
      padding-left: 44px !important;
    }
    .input-wrap input.has-toggle { padding-right: 46px !important; }

    .toggle-pw {
      position: absolute; right: 13px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--ink-faint); padding: 4px;
      display: flex; align-items: center;
      min-height: auto; border-radius: 50%;
      transition: color var(--transition);
      box-shadow: none;
    }
    .toggle-pw:hover { color: var(--primary); background: none; box-shadow: none; transform: translateY(-50%); }

    /* ── ID hint chips ── */
    .id-chips {
      display: flex; flex-wrap: wrap; gap: 5px;
      margin-top: 6px;
    }
    .id-chip {
      font-size: 0.68rem; font-weight: 600;
      font-family: 'Inter', monospace;
      padding: 2px 8px; border-radius: 100px;
      background: var(--accent-soft);
      color: var(--primary);
      border: 1px solid rgba(15,76,129,0.14);
      letter-spacing: 0.03em;
    }

    /* ── Spinner on submit ── */
    .spinner {
      width: 17px; height: 17px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.65s linear infinite;
      display: none;
    }
    .btn-primary.loading .spinner { display: block; }
    .btn-primary.loading .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Message ── */
    .msg {
      margin-top: 14px;
      padding: 13px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      font-weight: 500;
      display: none;
      align-items: center;
      gap: 10px;
    }
    .msg.show { display: flex; }
    .msg.success {
      color: var(--success);
      background: var(--success-bg);
      border: 1px solid rgba(22,101,52,0.18);
    }
    .msg.error {
      color: var(--error);
      background: var(--error-bg);
      border: 1px solid rgba(185,28,28,0.18);
    }

    /* ── Footer ── */
    .login-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--ink-faint);
      letter-spacing: 0.05em;
    }

    @media (max-width: 480px) {
      .login-card { padding: 32px 22px 28px; }
      .login-brand-divider, .login-brand-sub { display: none; }
    }
  </style>
</head>
<body>

  <div class="login-wrapper">

    <!-- Brand -->
    <div class="login-brand">
      <div class="login-brand-logo">
        <img src="./assets/images/nestle-logo-brown.png" alt="Nestlé Logo" />
      </div>
      <span class="login-brand-name">Nestlé Connect</span>
      <span class="login-brand-divider">·</span>
      <span class="login-brand-sub">Portal</span>
    </div>

    <!-- Card -->
    <div class="login-card">
      <div class="corner-mark">L</div>

      <h1 class="login-title">Sign in</h1>
      <p class="login-sub">Enter your Employee ID and password to continue.</p>

      <hr class="divider" />

      <form id="loginForm" autocomplete="off" novalidate>

        <!-- Employee ID -->
        <div class="form-group">
          <label for="employeeId">Employee ID</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="7" width="20" height="14" rx="2"/>
                <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
                <line x1="12" y1="12" x2="12" y2="16"/>
                <line x1="10" y1="14" x2="14" y2="14"/>
              </svg>
            </span>
            <input type="text" id="employeeId" placeholder="e.g. SYS-000001" autocomplete="off" spellcheck="false" required />
          </div>
          <div class="id-chips">
            <span class="id-chip">SYS-000001</span>
            <span class="id-chip">ASM-000001</span>
            <span class="id-chip">DMM-000001</span>
            <span class="id-chip">SD-WES-COL-000001</span>
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input type="password" id="password" class="has-toggle" placeholder="Enter your password" autocomplete="current-password" required />
            <button type="button" id="togglePw" class="toggle-pw" aria-label="Toggle password visibility">
              <svg id="eyeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" id="loginBtn" class="btn-primary">
          <div class="spinner"></div>
          <span class="btn-label">Login</span>
        </button>

        <!-- Message -->
        <div id="msgBox" class="msg">
          <svg id="msgIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
          <span id="msgText"></span>
        </div>

      </form>
    </div>

    <p class="login-footer">© 2026 Nestlé Lanka PLC · All rights reserved</p>

  </div>

<script>
  const form     = document.getElementById('loginForm');
  const loginBtn = document.getElementById('loginBtn');
  const empId    = document.getElementById('employeeId');
  const pwInput  = document.getElementById('password');
  const msgBox   = document.getElementById('msgBox');
  const msgText  = document.getElementById('msgText');
  const msgIcon  = document.getElementById('msgIcon');
  const togglePw = document.getElementById('togglePw');
  const eyeIcon  = document.getElementById('eyeIcon');

  const EYE  = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  const EYEO = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;

  togglePw.addEventListener('click', () => {
    const hide = pwInput.type === 'password';
    pwInput.type = hide ? 'text' : 'password';
    eyeIcon.innerHTML = hide ? EYEO : EYE;
  });

  // Auto-uppercase employee ID
  empId.addEventListener('input', () => {
    const p = empId.selectionStart;
    empId.value = empId.value.toUpperCase();
    empId.setSelectionRange(p, p);
  });

  function showMsg(text, type) {
    msgBox.className = `msg ${type} show`;
    msgText.textContent = text;
    msgIcon.innerHTML = type === 'success'
      ? `<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>`
      : `<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>`;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = empId.value.trim();
    const pw = pwInput.value.trim();
    if (!id || !pw) { showMsg('Please fill in all fields.', 'error'); return; }

    msgBox.className = 'msg';
    loginBtn.classList.add('loading');
    loginBtn.disabled = true;

    try {
      const res  = await fetch(`${API_BASE}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: id, password: pw })
      });
      const data = await res.json();

      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showMsg('Login successful! Redirecting…', 'success');
        setTimeout(() => {
          const staffRoles = [
            'admin','sys_admin',
            'digital_marketing_manager','digital_content_specialist',
            'digital_media_performance_manager','social_media_influencer_strategist',
            'crm_data_analyst','digital_marketing_intern'
          ];
          const fieldMgrRoles = ['area_sales_manager','field_sales_manager'];
          if (staffRoles.includes(data.user.role)) {
            window.location.href = 'admin-dashboard.html';
          } else if (fieldMgrRoles.includes(data.user.role)) {
            window.location.href = 'field-manager-dashboard.html';
          } else if (data.user.role === 'sales_distributor') {
            window.location.href = 'rep-dashboard.html';
          }
        }, 900);
      } else {
        showMsg(data.message || 'Invalid Employee ID or password.', 'error');
        loginBtn.classList.remove('loading');
        loginBtn.disabled = false;
      }
    } catch {
      showMsg('Network error. Please try again.', 'error');
      loginBtn.classList.remove('loading');
      loginBtn.disabled = false;
    }
  });
</script>

</body>
</html>
