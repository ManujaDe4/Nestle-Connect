<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop Owner Registration</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <script src="./js/locations.js"></script>
</head>
<body>

  <div class="page-wrapper">

    <div class="brand">
      <img src="./assets/images/nestle-logo-brown.png" alt="Nestlé Logo" class="brand-logo" />
      <span class="brand-name">Nestlé Connect</span>
      <span class="brand-divider">·</span>
      <span class="brand-sub">Rep Portal</span>
    </div>

    <div class="card">
      <div class="corner-mark">R</div>

      <div class="card-header">
        <h1 class="card-title">Shop Owner <span>Registration</span></h1>
        <p>Register a new shop and generate its verification QR instantly.</p>
      </div>

      <hr class="divider" />

      <form id="registrationForm">
        <div class="form-group">
          <label for="shopName">Shop Name</label>
          <input type="text" id="shopName" placeholder="Enter shop name" required />
        </div>

        <div class="form-group">
          <label for="ownerMobile">Owner Mobile</label>
          <input type="tel" id="ownerMobile" placeholder="Enter owner mobile number" required />
        </div>

        <div class="form-group">
          <label for="nicNumber">NIC Number</label>
          <input type="text" id="nicNumber" placeholder="Enter owner NIC number" required />
        </div>

        <div class="form-group">
          <label for="shopProvince">Province</label>
          <select id="shopProvince" required><option value="">Select Province</option></select>
        </div>
        <div class="form-group">
          <label for="shopRegion">Region (District)</label>
          <select id="shopRegion" required><option value="">Select Region</option></select>
        </div>
        <div class="form-group">
          <label for="shopArea">Area</label>
          <select id="shopArea" required><option value="">Select Area</option></select>
        </div>

        <button type="submit" id="registerBtn" class="btn-primary"><span>Register Shop</span></button>
      </form>

      <hr class="divider" />

      <div id="responseMsg">Fill in the details and click register.</div>

      <div id="qrSection" style="display: none;" class="dashboard-card" >
        <h3>Registration Complete</h3>
        <div class="result-grid">
          <div class="result-box"><span class="result-label">Shop ID</span><span class="result-value" id="shopId"></span></div>
          <div class="result-box"><span class="result-label">Shop Name</span><span class="result-value" id="shopNameDisplay"></span></div>
          <div class="result-box"><span class="result-label">Owner Mobile</span><span class="result-value" id="ownerMobileDisplay"></span></div>
          <div class="result-box"><span class="result-label">NIC Number</span><span class="result-value" id="nicNumberDisplay"></span></div>
          <div class="result-box"><span class="result-label">QR Slug</span><span class="result-value" id="qrSlug"></span></div>
        </div>
        <div style="margin-top: 20px; text-align:center;">
          <img id="qrCode" src="" alt="QR Code" style="max-width: 260px; width: 100%; border-radius: 16px; border: 1px solid var(--border); padding: 10px; background: var(--surface);" />
          <br>
          <button id="downloadQrBtn" type="button" class="btn-secondary" style="margin-top: 15px;">Download QR Code</button>
        </div>
      </div>

    </div>

  </div>

  <script>
    const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? 'http://localhost:5000' : 'https://nestle-connect.onrender.com';

    function checkAuth() {
      const token = localStorage.getItem("token");
      const user = JSON.parse(localStorage.getItem("user"));
      if (!token || !user || user.role !== "rep") {
        window.location.href = "login.html";
        return null;
      }
      return user;
    }

    const currentUser = checkAuth();

    const form = document.getElementById("registrationForm");
    const registerBtn = document.getElementById("registerBtn");
    const responseMsg = document.getElementById("responseMsg");
    const qrSection = document.getElementById("qrSection");
    const downloadQrBtn = document.getElementById("downloadQrBtn");

    function setMessage(message, type = "") {
      responseMsg.className = "";
      responseMsg.innerHTML = message;

      if (type === "success") {
        responseMsg.classList.add("state-success");
      } else if (type === "error") {
        responseMsg.classList.add("state-error");
      }
    }

    function setButtonState(button, disabled, text) {
      button.disabled = disabled;
      const span = button.querySelector("span");
      if (span && text) span.innerText = text;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const shopName = document.getElementById("shopName").value.trim();
      const ownerMobile = document.getElementById("ownerMobile").value.trim();
      const nicNumber = document.getElementById("nicNumber").value.trim();
      const province = document.getElementById("shopProvince").value;
      const region = document.getElementById("shopRegion").value;
      const area = document.getElementById("shopArea").value;

      if (!shopName || !ownerMobile || !nicNumber) {
        setMessage("Please fill in all fields.", "error");
        return;
      }

      setButtonState(registerBtn, true, "Registering...");
      setMessage("Registering shop...");

      try {
        const token = localStorage.getItem("token");
        const response = await fetch(`${API_BASE}/api/shops`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`,
          },
          body: JSON.stringify({
            shop_name: shopName,
            owner_mobile: ownerMobile,
            nic_number: nicNumber,
            province: province,
            region: region,
            area: area
          }),
        });

        const data = await response.json();

        if (response.ok) {
          setMessage(data.message, "success");
          document.getElementById("shopId").textContent = data.shop.shop_id;
          document.getElementById("shopNameDisplay").textContent = data.shop.shop_name;
          document.getElementById("ownerMobileDisplay").textContent = data.shop.owner_mobile;
          document.getElementById("nicNumberDisplay").textContent = data.shop.nic_number;
          document.getElementById("qrSlug").textContent = data.shop.qr_slug;
          document.getElementById("qrCode").src = data.qrCode;
          qrSection.style.display = "block";
        } else {
          setMessage(data.message || "Registration failed.", "error");
        }
      } catch (error) {
        console.error("Registration error:", error);
        setMessage("An error occurred during registration.", "error");
      } finally {
        setButtonState(registerBtn, false, "Register Shop");
      }
    });

    downloadQrBtn.addEventListener("click", () => {
      const qrImage = document.getElementById("qrCode");
      const shopName = document.getElementById("shopNameDisplay").textContent || "Shop";
      const link = document.createElement("a");
      link.href = qrImage.src;
      link.download = `${shopName.replace(/\s+/g, '-')}-QR.png`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    });

    function setupCascadingDropdowns() {
      const provinceSelect = document.getElementById('shopProvince');
      const regionSelect   = document.getElementById('shopRegion');
      const areaSelect     = document.getElementById('shopArea');

      if (!window.SRI_LANKA_LOCATIONS) return;

      const repProvince = currentUser && currentUser.province;
      const repRegion   = currentUser && currentUser.region;

      if (repProvince && repRegion) {
        // Lock province & region to the rep's assigned values
        provinceSelect.innerHTML = `<option value="${repProvince}">${repProvince}</option>`;
        provinceSelect.disabled = true;

        regionSelect.innerHTML = `<option value="${repRegion}">${repRegion}</option>`;
        regionSelect.disabled = true;

        // Show lock notice
        const notice = document.createElement('div');
        notice.style.cssText = 'background:rgba(15,76,129,0.07);border:1px solid rgba(15,76,129,0.18);border-radius:12px;padding:12px 16px;margin-bottom:18px;font-size:0.9rem;color:#0f172a;display:flex;align-items:center;gap:8px;';
        notice.innerHTML = `<span>🔒</span><span>Location locked to your assigned region: <strong>${repProvince} › ${repRegion}</strong></span>`;
        provinceSelect.closest('form').insertBefore(notice, provinceSelect.closest('.form-group').parentNode);

        // Populate area dropdown
        areaSelect.innerHTML = '<option value="">Select Area</option>';
        const areas = (window.SRI_LANKA_LOCATIONS[repProvince] || {})[repRegion] || [];
        areas.forEach(a => areaSelect.add(new Option(a, a)));
      } else {
        // No assigned region — full free selection
        provinceSelect.innerHTML = '<option value="">Select Province</option>';
        Object.keys(window.SRI_LANKA_LOCATIONS).forEach(p => {
          provinceSelect.add(new Option(p, p));
        });

        provinceSelect.addEventListener('change', () => {
          const p = provinceSelect.value;
          regionSelect.innerHTML = '<option value="">Select Region</option>';
          areaSelect.innerHTML = '<option value="">Select Area</option>';
          if (p && window.SRI_LANKA_LOCATIONS[p]) {
            Object.keys(window.SRI_LANKA_LOCATIONS[p]).forEach(r => regionSelect.add(new Option(r, r)));
          }
        });

        regionSelect.addEventListener('change', () => {
          const p = provinceSelect.value;
          const r = regionSelect.value;
          areaSelect.innerHTML = '<option value="">Select Area</option>';
          if (p && r && window.SRI_LANKA_LOCATIONS[p][r]) {
            window.SRI_LANKA_LOCATIONS[p][r].forEach(a => areaSelect.add(new Option(a, a)));
          }
        });
      }
    }

    setupCascadingDropdowns();

  </script>

</body>
</html>
