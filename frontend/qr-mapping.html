<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link QR Code to Shop - Nestlé Connect</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .qr-mapping-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 30px;
            background: linear-gradient(135deg, var(--surface-alt) 0%, var(--surface) 100%);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .qr-mapping-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--primary-light);
        }

        .qr-mapping-header h1 {
            font-size: 1.8rem;
            color: var(--primary-dark);
            margin: 0 0 10px 0;
            font-weight: 700;
        }

        .qr-mapping-header p {
            color: var(--ink-muted);
            font-size: 0.95rem;
            margin: 0;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .shop-selector {
            position: relative;
            width: 100%;
        }

        .shop-selector select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            background-color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 18px;
            padding-right: 40px;
        }

        .shop-selector select:hover {
            border-color: var(--primary);
        }

        .shop-selector select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.1);
        }

        .qr-input-group {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .qr-input-group input {
            flex: 1;
        }

        .qr-input-group button {
            padding: 12px 20px;
            background-color: var(--secondary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .qr-input-group button:hover {
            background-color: #ff9800;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 152, 0, 0.3);
        }

        .qr-input-group button:active {
            transform: translateY(0);
        }

        .manual-input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
        }

        .manual-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.1);
        }

        .scan-note {
            font-size: 0.82rem;
            color: var(--ink-muted);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        .btn-primary {
            flex: 1;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-primary:hover {
            background-color: #0856ca;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(13, 110, 253, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            flex: 1;
            padding: 14px;
            background-color: white;
            color: var(--primary);
            border: 2px solid var(--primary);
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-secondary:hover {
            background-color: var(--primary-light);
            transform: translateY(-2px);
        }

        .btn-secondary:active {
            transform: translateY(0);
        }

        .success-message {
            display: none;
            padding: 16px;
            background-color: #e8f5e9;
            border-left: 4px solid #4caf50;
            border-radius: 4px;
            margin-top: 20px;
            color: #2e7d32;
        }

        .success-message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .error-message {
            display: none;
            padding: 16px;
            background-color: #ffebee;
            border-left: 4px solid #f44336;
            border-radius: 4px;
            margin-top: 20px;
            color: #c62828;
        }

        .error-message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .shop-info {
            background-color: var(--surface-alt);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: none;
        }

        .shop-info.show {
            display: block;
        }

        .shop-info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 0.95rem;
            border-bottom: 1px solid var(--border-color);
        }

        .shop-info-item:last-child {
            border-bottom: none;
        }

        .shop-info-label {
            font-weight: 600;
            color: var(--ink-muted);
        }

        .shop-info-value {
            color: var(--ink-main);
            font-weight: 500;
        }

        .navigation-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
        }

        .back-btn:hover {
            color: #0856ca;
        }
    </style>
</head>
<body>
    <div class="qr-mapping-container">
        <div class="navigation-header">
            <button class="back-btn" onclick="goBack()">←</button>
            <div>
                <h2 style="margin: 0; font-size: 1.2rem;">QR Code Linking</h2>
            </div>
        </div>

        <div class="qr-mapping-header">
            <h1>Link QR Code to Shop</h1>
            <p>Associate a pre-printed QR code with your shop</p>
        </div>

        <div class="form-group">
            <label for="shopSelect">Select Shop *</label>
            <div class="shop-selector">
                <select id="shopSelect" onchange="onShopSelected()">
                    <option value="">-- Choose a shop --</option>
                </select>
            </div>
        </div>

        <div class="shop-info" id="shopInfo">
            <div class="shop-info-item">
                <span class="shop-info-label">Shop ID:</span>
                <span class="shop-info-value" id="shopIdDisplay"></span>
            </div>
            <div class="shop-info-item">
                <span class="shop-info-label">Shop Name:</span>
                <span class="shop-info-value" id="shopNameDisplay"></span>
            </div>
            <div class="shop-info-item">
                <span class="shop-info-label">Owner Mobile:</span>
                <span class="shop-info-value" id="ownerMobileDisplay"></span>
            </div>
            <div class="shop-info-item">
                <span class="shop-info-label">Current QR:</span>
                <span class="shop-info-value" id="currentQRDisplay">Not linked</span>
            </div>
        </div>

        <div class="form-group">
            <label for="qrIdentifier">QR Code Identifier *</label>
            <div class="qr-input-group">
                <input 
                    type="text" 
                    id="qrIdentifier" 
                    class="manual-input" 
                    placeholder="Scan or enter QR code"
                    autocomplete="off"
                >
                <button type="button" onclick="triggerCamera()">📷</button>
            </div>
            <div class="scan-note">
                💡 Scan the pre-printed QR code or enter its identifier manually
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn-primary" onclick="linkQRCode()">Link QR Code</button>
            <button class="btn-secondary" onclick="resetForm()">Reset</button>
        </div>

        <div class="success-message" id="successMessage"></div>
        <div class="error-message" id="errorMessage"></div>
    </div>

    <script>
        const token = localStorage.getItem('authToken');
        let shops = [];
        let selectedShop = null;

        async function loadShops() {
            try {
                const response = await fetch('/api/shops', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    shops = await response.json();
                    populateShopDropdown();
                } else {
                    showError('Failed to load shops');
                }
            } catch (error) {
                console.error('Error loading shops:', error);
                showError('Error loading shops');
            }
        }

        function populateShopDropdown() {
            const select = document.getElementById('shopSelect');
            shops.forEach(shop => {
                const option = document.createElement('option');
                option.value = shop.id;
                option.textContent = `${shop.shop_name} (${shop.shop_id})`;
                option.setAttribute('data-shop', JSON.stringify(shop));
                select.appendChild(option);
            });
        }

        function onShopSelected() {
            const select = document.getElementById('shopSelect');
            const selectedValue = select.value;

            if (!selectedValue) {
                document.getElementById('shopInfo').classList.remove('show');
                selectedShop = null;
                return;
            }

            selectedShop = shops.find(s => s.id == selectedValue);
            if (selectedShop) {
                document.getElementById('shopIdDisplay').textContent = selectedShop.shop_id;
                document.getElementById('shopNameDisplay').textContent = selectedShop.shop_name;
                document.getElementById('ownerMobileDisplay').textContent = selectedShop.owner_mobile;
                document.getElementById('currentQRDisplay').textContent = selectedShop.qr_identifier || 'Not linked';
                document.getElementById('shopInfo').classList.add('show');
                document.getElementById('qrIdentifier').focus();
            }
        }

        async function linkQRCode() {
            if (!selectedShop) {
                showError('Please select a shop');
                return;
            }

            const qrIdentifier = document.getElementById('qrIdentifier').value.trim();
            if (!qrIdentifier) {
                showError('Please enter or scan a QR code identifier');
                return;
            }

            try {
                const response = await fetch('/api/shops/map-qr', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        shop_id: selectedShop.id,
                        qr_identifier: qrIdentifier
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess(`✓ QR Code Successfully Linked to ${data.shop.shop_name}`);
                    document.getElementById('currentQRDisplay').textContent = data.qr_identifier;
                    document.getElementById('qrIdentifier').value = '';
                    setTimeout(() => {
                        resetForm();
                    }, 2000);
                } else {
                    showError(data.message || 'Failed to link QR code');
                }
            } catch (error) {
                console.error('Error linking QR code:', error);
                showError('Error linking QR code');
            }
        }

        function triggerCamera() {
            // For now, just focus on text input
            // In a real app, integrate with camera/barcode scanner library
            document.getElementById('qrIdentifier').focus();
            alert('Please use your device\'s camera/barcode scanner to scan the QR code, or enter the code manually.');
        }

        function showSuccess(message) {
            const msgEl = document.getElementById('successMessage');
            msgEl.textContent = message;
            msgEl.classList.add('show');
            setTimeout(() => msgEl.classList.remove('show'), 4000);
            hideError();
        }

        function showError(message) {
            const msgEl = document.getElementById('errorMessage');
            msgEl.textContent = message;
            msgEl.classList.add('show');
            setTimeout(() => msgEl.classList.remove('show'), 4000);
        }

        function hideError() {
            document.getElementById('errorMessage').classList.remove('show');
        }

        function resetForm() {
            document.getElementById('shopSelect').value = '';
            document.getElementById('qrIdentifier').value = '';
            document.getElementById('shopInfo').classList.remove('show');
            hideError();
            selectedShop = null;
        }

        function goBack() {
            window.history.back();
        }

        // Load shops on page load
        document.addEventListener('DOMContentLoaded', () => {
            if (!token) {
                window.location.href = '/login.html';
                return;
            }
            loadShops();
        });
    </script>
</body>
</html>
